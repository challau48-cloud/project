<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LinguaAI</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-page">
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <span class="logo-icon">🌍</span> LinguaAI
            </a>
            <ul class="nav-menu">
                <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                <li class="nav-item"><a href="register.html" class="nav-link btn-register">Register</a></li>
            </ul>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-box">
            <h1>Welcome Back</h1>
            <p class="auth-subtitle">Login to continue learning</p>

            <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="loginEmail">Email Address</label>
                    <input type="email" id="loginEmail" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" name="password" placeholder="Enter your password" required>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe">
                    <label for="rememberMe">Remember me</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Login</button>
            </form>

            <p class="forgot-password">
                <a href="#forgot">Forgot your password?</a>
            </p>

            <div class="divider">OR</div>

            <div class="social-login">
                <button class="btn btn-social" onclick="loginWithGoogle()">
                    <span>🔵</span> Google
                </button>
                <button class="btn btn-social" onclick="loginWithFacebook()">
                    <span>📘</span> Facebook
                </button>
            </div>

            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up here</a></p>
        </div>

        <div class="auth-side">
            <div class="side-content">
                <h2>Welcome to LinguaAI</h2>
                <ul class="benefits">
                    <li>✅ Continue your learning</li>
                    <li>📊 View your progress</li>
                    <li>🎯 Access personalized lessons</li>
                    <li>🏆 Earn achievements</li>
                    <li>🌟 Join our community</li>
                </ul>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
